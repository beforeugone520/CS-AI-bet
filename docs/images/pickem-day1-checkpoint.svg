      .column-sub { fill: #8ea6ca; font: 500 13px Arial, Helvetica, sans-serif; letter-spacing: 0; }
      .team { fill: #f4f8ff; font-family: Arial, Helvetica, sans-serif; font-weight: 800; letter-spacing: 0; }
